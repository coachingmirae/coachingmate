<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>기본정보 | CoachingMate</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="./script.js"></script>
</head>
<body>
  <main class="app-shell">
    <section class="survey-card">
      <header class="survey-header">
        <div class="brand-mini"><div class="logo-box small">CM</div><div><h1>CoachingMate</h1><p>Leadership Coaching Platform</p></div></div>
        <div class="participant-badge">참여코드 <strong id="participantCodeText">-</strong></div>
      </header>

      <section class="progress-steps compact">
        <div class="step-item active"><span class="step-dot">1</span><span>기본정보</span></div><div class="step-line"></div>
        <div class="step-item"><span class="step-dot">2</span><span>리더십 진단</span></div><div class="step-line"></div>
        <div class="step-item"><span class="step-dot">3</span><span>코칭 니즈</span></div><div class="step-line"></div>
        <div class="step-item"><span class="step-dot">4</span><span>완료</span></div>
      </section>

      <section id="validView" class="content-section hidden">
        <div class="page-title-box"><p class="eyebrow">STEP 1</p><h2>기본정보</h2><p>코칭 준비를 위해 필요한 기본정보를 입력해 주세요.</p></div>
        <form id="basicInfoForm" novalidate>
          <div class="form-grid">
            <div class="form-field"><label for="company">회사명<span class="required-mark">*</span></label><input id="company" name="company" type="text" required /></div>
            <div class="form-field"><label for="name">성명<span class="required-mark">*</span></label><input id="name" name="name" type="text" required /></div>
            <div class="form-field"><label for="department">부서</label><input id="department" name="department" type="text" /></div>
            <div class="form-field"><label for="position">직책/직위<span class="required-mark">*</span></label><input id="position" name="position" type="text" required /></div>
            <div class="form-field full"><label for="email">이메일</label><input id="email" name="email" type="email" /></div>
            <!--
            <div class="form-field full"><label for="phone">연락처</label><input id="phone" name="phone" type="tel" /></div>
            -->
          </div>
          <div id="errorMessage" class="error-message hidden"></div>
          <div class="form-actions">
            <button type="button" id="backButton" class="secondary-button">처음 화면</button>
            <button type="submit" class="primary-button">다음: 리더십 진단</button>
          </div>
          <p id="saveStatus" class="save-status">자동 저장 대기 중</p>
        </form>
      </section>

      <section id="invalidView" class="content-section hidden"><div class="error-card"><h2>참여코드를 확인할 수 없습니다.</h2><p>올바른 참여 링크로 다시 접속해 주세요.</p></div></section>
      <footer class="page-footer"><p>© CoachingMate. All rights reserved.</p></footer>
    </section>
  </main>

  <script>
    const STORAGE_KEYS = { participantCode:"cm_participant_code", basicInfo:"cm_basic_info", currentStep:"cm_current_step", lastSavedAt:"cm_last_saved_at" };
    const participantCodeText = document.getElementById("participantCodeText");
    const validView = document.getElementById("validView");
    const invalidView = document.getElementById("invalidView");
    const form = document.getElementById("basicInfoForm");
    const errorMessage = document.getElementById("errorMessage");
    const saveStatus = document.getElementById("saveStatus");
    const backButton = document.getElementById("backButton");
    const formFields = ["company", "name", "position", "department", "email"];

// 실제 필수 입력 항목
// 부서(department), 이메일(email)은 선택 입력
const requiredFields = ["company", "name", "position"];

let autoSaveTimer = null;

    function formatDateTime(date) {
      return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")} ${String(date.getHours()).padStart(2,"0")}:${String(date.getMinutes()).padStart(2,"0")}`;
    }
    function getBasicInfoFromForm() {
      const data = { participant_code: cmGetParticipantCode() };
      formFields.forEach(function (field) { data[field] = document.getElementById(field).value.trim(); });
      return data;
    }
    function saveBasicInfo() {
      const now = new Date();
      localStorage.setItem(STORAGE_KEYS.basicInfo, JSON.stringify(getBasicInfoFromForm()));
      localStorage.setItem(STORAGE_KEYS.currentStep, "basic-info");
      localStorage.setItem(STORAGE_KEYS.lastSavedAt, now.toISOString());
      saveStatus.textContent = `자동 저장됨 · ${formatDateTime(now)}`;
    }
    function scheduleAutoSave() {
      saveStatus.textContent = "입력 중...";
      if (autoSaveTimer) clearTimeout(autoSaveTimer);
      autoSaveTimer = setTimeout(saveBasicInfo, 500);
    }
    function loadSaved() {
      const saved = localStorage.getItem(STORAGE_KEYS.basicInfo);
      if (!saved) return;
      try {
        const data = JSON.parse(saved);
        formFields.forEach(function(field){ if (data[field]) document.getElementById(field).value = data[field]; });
      } catch (e) { console.warn(e); }
    }
    function showError(message) { errorMessage.textContent = message; errorMessage.classList.remove("hidden"); }
    function clearError() { errorMessage.textContent = ""; errorMessage.classList.add("hidden"); }

    function initializePage() {
      const code = cmGetParticipantCode();
      if (!code) { invalidView.classList.remove("hidden"); return; }
      participantCodeText.textContent = code;
      validView.classList.remove("hidden");
      loadSaved();
    }
    formFields.forEach(function(field){ document.getElementById(field).addEventListener("input", scheduleAutoSave); });
    form.addEventListener("submit", function(event){
  event.preventDefault();
  clearError();

  const missing = requiredFields.filter(function(field){
    return !document.getElementById(field).value.trim();
  });

  if (missing.length) {
    showError("필수 입력 항목을 모두 입력해 주세요.");
    return;
  }

  saveBasicInfo();
  localStorage.setItem(STORAGE_KEYS.currentStep, "leadership");
  window.location.href = "./leadership.html";
});
    backButton.addEventListener("click", function(){ window.location.href = "./index.html?id=" + encodeURIComponent(cmGetParticipantCode()); });
    initializePage();
  </script>
</body>
</html>
