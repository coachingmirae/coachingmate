<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제출 완료 | CoachingMate</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="./script.js"></script>
</head>
<body>
  <main class="app-shell"><section class="survey-card">
    <section class="complete-card">
      <div class="complete-icon">✓</div>
      <p class="eyebrow">SUBMITTED</p>
      <h2>제출이 완료되었습니다.</h2>
      <p class="description">리더십 진단과 코칭 니즈조사에 참여해 주셔서 감사합니다. 입력하신 내용은 담당 코치가 코칭 준비 및 방향 설정을 위해 확인합니다.</p>
      <div class="complete-summary" id="summaryBox"><div><span class="info-label">응답자</span><strong id="nameText">-</strong></div><div><span class="info-label">회사/직책</span><strong id="metaText">-</strong></div><div><span class="info-label">제출일시</span><strong id="submittedAtText">-</strong></div></div>
      <div class="notice-box"><strong>안내</strong><p>응답이 정상 제출되었습니다. 이제 브라우저 창을 닫아 주세요.</p><p>동일 링크로 다시 접속하면 제출 완료 상태를 확인할 수 있습니다.</p></div>
      <!-- 완료 화면 버튼은 운영 MVP에서 숨김 처리합니다.
      <div class="button-row"><button type="button" id="summaryButton" class="secondary-button">저장된 응답 요약 보기</button><button type="button" id="homeButton" class="primary-button">처음 화면으로</button></div>
      -->
    </section>
    <footer class="page-footer"><p>© CoachingMate. All rights reserved.</p></footer>
  </section></main>
  <script>
    function formatDateTime(iso){if(!iso)return "-"; const d=new Date(iso); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;}
    try{const payload=JSON.parse(localStorage.getItem("cm_final_submission")||"{}"); const basic=payload.basic_info||{}; document.getElementById("nameText").textContent=basic.name||"-"; document.getElementById("metaText").textContent=[basic.company,basic.department,basic.position].filter(Boolean).join(" / ")||"-"; document.getElementById("submittedAtText").textContent=formatDateTime(payload.submitted_at||localStorage.getItem("cm_submitted_at"));}catch(e){console.warn(e);}
  </script>
</body>
</html>
